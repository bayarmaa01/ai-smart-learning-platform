apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: eduai
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: eduai
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
  - name: http
    port: 5000
    targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: eduai
  labels:
    app: ai-service
spec:
  selector:
    app: ai-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
