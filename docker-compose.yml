networks:
  eduai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eduai-postgres
    environment:
      POSTGRES_DB: eduai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eduai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eduai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: eduai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eduai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduai-backend
    ports:
      - "4000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: eduai-postgres
      DB_PORT: 5432
      DB_NAME: eduai
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: eduai-redis
      REDIS_PORT: 6379
      OLLAMA_URL: http://eduai-ollama:11434
      OLLAMA_MODEL: gemma:2b
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduai-network
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # AI Service (Optional - can fail without breaking system)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: eduai-ai-service
    ports:
      - "5001:8000"
    environment:
      PORT: 8000
      DEBUG: false
      REDIS_URL: redis://eduai-redis:6379
      OLLAMA_BASE_URL: http://eduai-ollama:11434
      AI_PROVIDER: ollama
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - eduai-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  
  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduai-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: /api/v1
      VITE_AI_URL: /ai
      VITE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - eduai-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: eduai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - eduai-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: eduai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - eduai-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: eduai-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - eduai-network
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  
