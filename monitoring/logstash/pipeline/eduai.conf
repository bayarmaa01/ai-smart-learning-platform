input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json_lines
  }

  udp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON logs from Node.js (Winston)
  if [type] == "nodejs" or [service] == "backend" {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }

    if [parsed] {
      mutate {
        rename => {
          "[parsed][level]"     => "log_level"
          "[parsed][message]"   => "log_message"
          "[parsed][timestamp]" => "log_timestamp"
          "[parsed][requestId]" => "request_id"
          "[parsed][userId]"    => "user_id"
          "[parsed][method]"    => "http_method"
          "[parsed][url]"       => "http_url"
          "[parsed][statusCode]" => "http_status"
          "[parsed][duration]"  => "response_time_ms"
        }
      }
    }

    # Normalize log level
    mutate {
      uppercase => ["log_level"]
    }
  }

  # Parse Python FastAPI logs
  if [service] == "ai-service" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} \[%{LOGLEVEL:log_level}\] %{DATA:logger}: %{GREEDYDATA:log_message}"
      }
    }
  }

  # Add environment tag
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:production}"
      "platform"    => "eduai"
    }
  }

  # Parse timestamp
  date {
    match => ["log_timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
    remove_field => ["log_timestamp"]
  }

  # Drop health check noise
  if [http_url] =~ /\/health/ or [http_url] =~ /\/metrics/ {
    drop {}
  }

  # GeoIP enrichment for IP addresses
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
    index => "eduai-logs-%{+YYYY.MM.dd}"
    template_name => "eduai-logs"
    template_overwrite => true
  }

  # Also output errors to separate index for alerting
  if [log_level] == "ERROR" or [log_level] == "FATAL" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
      index => "eduai-errors-%{+YYYY.MM.dd}"
    }
  }

  # Debug output (disable in production)
  # stdout { codec => rubydebug }
}
