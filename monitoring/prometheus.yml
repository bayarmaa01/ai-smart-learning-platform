global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eduai-backend'
    static_configs:
      - targets: ['backend:4000']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 5s

  - job_name: 'eduai-ai-service'
    static_configs:
      - targets: ['ai-service:8000']
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 3s

  - job_name: 'eduai-nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 3s

  - job_name: 'eduai-frontend'
    static_configs:
      - targets: ['frontend:80']
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 3s
