global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eduai-backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 5s

  # Note: PostgreSQL and Redis don't expose metrics by default
  # You need to install exporters like postgres_exporter and redis_exporter
  # For now, these will fail but won't break Prometheus
  
  - job_name: 'eduai-nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 3s

  - job_name: 'eduai-frontend'
    static_configs:
      - targets: ['frontend:80']
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 3s
