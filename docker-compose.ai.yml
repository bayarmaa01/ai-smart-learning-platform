# Optional AI Services - Only start when needed
# Use: docker compose -f docker-compose.yml -f docker-compose.ai.yml up -d

networks:
  eduai-network:
    external: true

volumes:
  ollama_data:

services:
  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: eduai-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - eduai-network
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull gemma:2b || true"]
    pull_policy: if_missing
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 10
      start_period: 60s
