# ArgoCD Application Configuration for EduAI Platform
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eduai-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bayarmaa01/ai-smart-learning-platform.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: eduai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
  retry:
    limit: 5
    backoff:
      duration: 5s
      factor: 2
      maxDuration: 3m
