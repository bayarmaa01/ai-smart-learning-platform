name: EDUAI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/eduai
  IMAGE_TAG: ${{ github.sha }}
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/eduai-frontend
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/eduai-backend
  AI_IMAGE: ${{ secrets.DOCKER_USERNAME }}/eduai-ai-service
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  # Lint and Test Job
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install
        
    - name: Lint frontend
      run: |
        cd frontend
        npm run lint
        
    - name: Test frontend
      run: |
        cd frontend
        npm run test:ci
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install backend dependencies
      run: |
        cd backend
        npm install
        
    - name: Lint backend
      run: |
        cd backend
        npm run lint
        
    - name: Test backend
      run: |
        cd backend
        npm run test:ci
        
    - name: Install AI service dependencies
      run: |
        cd ai-service
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        
    - name: Lint AI service
      run: |
        cd ai-service
        flake8 src/
        
    - name: Test AI service
      run: |
        cd ai-service
        python -m pytest tests/ -v

  # SonarCloud Analysis Job
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: lint-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
        
    - name: Install AI service dependencies
      run: |
        cd ai-service
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=bayarmaa01_ai-smart-learning-platform
          -Dsonar.organization=bayarmaa01
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
          -Dsonar.python.coverage.reportPaths=ai-service/coverage.xml
          -Dsonar.sources=frontend/,backend/,ai-service/
          -Dsonar.exclusions=**/node_modules/**,**/venv/**,**/__pycache__/**,**/coverage/**,**/dist/**
          -Dsonar.qualitygate.wait=false

  # Security Scan Job
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint-test, sonarcloud]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  # Build Docker Images Job
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-test, security-scan]
    outputs:
      frontend-image: ${{ steps.build-frontend.outputs.image }}
      backend-image: ${{ steps.build-backend.outputs.image }}
      ai-image: ${{ steps.build-ai.outputs.image }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        logout: false
        
    - name: Verify Docker authentication
      run: |
        echo "Verifying Docker authentication..."
        docker info
        echo "Testing pull permissions..."
        docker pull hello-world
        echo "Testing push permissions..."
        
        # Check if we can authenticate to Docker Hub
        if ! docker manifest inspect ${{ env.FRONTEND_IMAGE }}:latest > /dev/null 2>&1; then
          echo "⚠️  Docker Hub authentication may have insufficient scopes"
          echo "Please ensure DOCKER_PASSWORD is a Docker Hub Access Token with:"
          echo "- Read permissions"
          echo "- Write permissions" 
          echo "- Delete permissions"
          echo ""
          echo "Create token at: https://hub.docker.com/settings/security"
          echo ""
          echo "Continuing with build attempt..."
        else
          echo "✅ Docker authentication verified successfully!"
        fi
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.FRONTEND_IMAGE }}
          ${{ env.BACKEND_IMAGE }}
          ${{ env.AI_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Frontend image
      id: build-frontend
      continue-on-error: true
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        platforms: linux/amd64
        push: true
        tags: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels.frontend }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and push Backend image
      id: build-backend
      continue-on-error: true
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        platforms: linux/amd64
        push: true
        tags: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels.backend }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and push AI Service image
      id: build-ai
      continue-on-error: true
      uses: docker/build-push-action@v5
      with:
        context: ./ai-service
        platforms: linux/amd64
        push: true
        tags: ${{ env.AI_IMAGE }}:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels.ai }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to Staging Job
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Update Helm values for staging
      run: |
        # Update Helm values.yaml with new image tags
        sed -i "s|frontend:.*|frontend: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}|g" helm/eduai/values.yaml
        sed -i "s|backend:.*|backend: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}|g" helm/eduai/values.yaml
        sed -i "s|aiService:.*|aiService: ${{ env.AI_IMAGE }}:${{ env.IMAGE_TAG }}|g" helm/eduai/values.yaml
        sed -i "s|environment:.*|environment: staging|g" helm/eduai/values.yaml
        
        # Commit and push Helm values update
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add helm/eduai/values.yaml
        git diff --staged --quiet || git commit -m "chore: Update staging images to ${{ env.IMAGE_TAG }}"
        git push

  # Deploy to Production Job
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Update Helm values for production
      run: |
        # Update Helm values.yaml with new image tags
        sed -i "s|frontend:.*|frontend: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}|g" helm/eduai/values.yaml
        sed -i "s|backend:.*|backend: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}|g" helm/eduai/values.yaml
        sed -i "s|aiService:.*|aiService: ${{ env.AI_IMAGE }}:${{ env.IMAGE_TAG }}|g" helm/eduai/values.yaml
        sed -i "s|environment:.*|environment: production|g" helm/eduai/values.yaml
        
        # Commit and push Helm values update
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add helm/eduai/values.yaml
        git diff --staged --quiet || git commit -m "chore: Update production images to ${{ env.IMAGE_TAG }}"
        git push

  # Performance Test Job
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup k6
      uses: grafana/k6-action@v1
      with:
        k6-version: 'latest'
        
    - name: Run performance tests
      run: |
        k6 run --out json --vus 100 --duration 30s tests/performance/load-test.js --env BASE_URL=https://ailearn.duckdns.org
        
    - name: Upload performance results
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: performance-results.json

  # Cleanup Job
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: Cleanup old images
      run: |
        # Remove old Docker images (keep last 5)
        docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}" | \
        grep -E "(${{ env.FRONTEND_IMAGE }}|${{ env.BACKEND_IMAGE }}|${{ env.AI_IMAGE }})" | \
        tail -n +6 | \
        awk '{print $3}' | \
        xargs -r docker rmi -f 2>/dev/null || true
