[app_servers]
server1 ansible_host=YOUR_SERVER_IP_1 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/eduai_key
server2 ansible_host=YOUR_SERVER_IP_2 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/eduai_key

[db_servers]
db1 ansible_host=YOUR_DB_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/eduai_key

[monitoring_servers]
monitor1 ansible_host=YOUR_MONITOR_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/eduai_key

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
