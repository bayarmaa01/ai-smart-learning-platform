---
# ============================================================
# EduAI Platform - Ansible Playbook
# Server provisioning and configuration
# ============================================================

- name: Provision EduAI Platform Servers
  hosts: all
  become: yes
  vars:
    docker_version: "25.0"
    kubectl_version: "1.29.0"
    helm_version: "3.14.0"
    node_version: "20"
    python_version: "3.11"

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - htop
          - vim
          - unzip
          - jq
          - fail2ban
          - ufw
        state: present
      when: ansible_os_family == "Debian"

  roles:
    - security
    - docker
    - kubernetes-tools
    - monitoring-agent

  tasks:
    - name: Configure UFW firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"
        - "6443"

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    - name: Configure fail2ban
      copy:
        content: |
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          bantime = 3600
        dest: /etc/fail2ban/jail.local
      notify: restart fail2ban

    - name: Set system limits for high concurrency
      pam_limits:
        domain: "*"
        limit_type: "{{ item.type }}"
        limit_item: "{{ item.item }}"
        value: "{{ item.value }}"
      loop:
        - { type: soft, item: nofile, value: 65536 }
        - { type: hard, item: nofile, value: 65536 }
        - { type: soft, item: nproc, value: 65536 }
        - { type: hard, item: nproc, value: 65536 }

    - name: Configure sysctl for performance
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: net.core.somaxconn, value: 65535 }
        - { name: net.ipv4.tcp_max_syn_backlog, value: 65535 }
        - { name: vm.overcommit_memory, value: 1 }
        - { name: net.ipv4.ip_local_port_range, value: "1024 65535" }
        - { name: net.core.netdev_max_backlog, value: 65536 }

  handlers:
    - name: restart fail2ban
      service:
        name: fail2ban
        state: restarted

- name: Install Docker
  hosts: all
  become: yes
  tasks:
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users | default(['ubuntu']) }}"

- name: Install Kubernetes Tools
  hosts: all
  become: yes
  tasks:
    - name: Install kubectl
      get_url:
        url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install k9s (Kubernetes TUI)
      shell: |
        curl -sS https://webinstall.dev/k9s | bash
      args:
        creates: /usr/local/bin/k9s

- name: Deploy Application
  hosts: app_servers
  become: yes
  vars:
    app_dir: /opt/eduai
  tasks:
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy docker-compose file
      copy:
        src: ../docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu

    - name: Copy environment file
      template:
        src: templates/.env.j2
        dest: "{{ app_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Pull latest images
      shell: docker compose pull
      args:
        chdir: "{{ app_dir }}"

    - name: Start application
      shell: docker compose up -d --remove-orphans
      args:
        chdir: "{{ app_dir }}"

    - name: Wait for services to be healthy
      shell: docker compose ps --format json | jq -r '.[].Health'
      args:
        chdir: "{{ app_dir }}"
      register: health_check
      until: health_check.stdout_lines | select('match', 'unhealthy|starting') | list | length == 0
      retries: 30
      delay: 10
