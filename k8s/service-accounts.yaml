apiVersion: v1
kind: ServiceAccount
metadata:
  name: eduai-backend-sa
  namespace: eduai
  annotations:
    iam.gke.io/gcp-service-account: eduai-backend@your-project.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: eduai
  name: eduai-backend-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eduai-backend-rolebinding
  namespace: eduai
subjects:
- kind: ServiceAccount
  name: eduai-backend-sa
  namespace: eduai
roleRef:
  kind: Role
  name: eduai-backend-role
  apiGroup: rbac.authorization.k8s.io
