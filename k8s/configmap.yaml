apiVersion: v1
kind: ConfigMap
metadata:
  name: eduai-config
  namespace: eduai
data:
  NODE_ENV: "production"
  PORT: "5000"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "eduai_db"
  DB_USER: "postgres"
  DB_POOL_MAX: "20"
  REDIS_URL: "redis://redis-service:6379"
  AI_SERVICE_URL: "http://ai-service:8000"
  AWS_REGION: "us-east-1"
  S3_BUCKET: "eduai-uploads"
  LOG_LEVEL: "info"
  ALLOWED_ORIGINS: "https://eduai.yourdomain.com"
  # AI Service
  AI_PROVIDER: "openai"
  OPENAI_MODEL: "gpt-4-turbo-preview"
  MAX_TOKENS: "2000"
  RATE_LIMIT_PER_MINUTE: "60"
