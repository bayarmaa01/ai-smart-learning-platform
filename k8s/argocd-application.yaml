apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eduai-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: eduai-platform
    environment: production
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/ai-smart-learning-platform.git
    targetRevision: main
    path: helm/eduai
    helm:
      releaseName: eduai
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: eduai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eduai-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: eduai-platform
    environment: staging
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/ai-smart-learning-platform.git
    targetRevision: develop
    path: helm/eduai
    helm:
      releaseName: eduai-staging
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: eduai-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
