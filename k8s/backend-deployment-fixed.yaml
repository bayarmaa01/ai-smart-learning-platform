apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: eduai
  labels:
    app: backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
        prometheus.io/scheme: "http"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: eduai-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            # Database Configuration
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres123@postgres:5432/eduai?sslmode=disable"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "eduai"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres123"
            - name: DB_SSL_MODE
              value: "disable"
            
            # Redis Configuration
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            
            # AI/Ollama Configuration
            - name: OLLAMA_URL
              value: "http://host.docker.internal:11434"
            - name: OLLAMA_MODEL
              value: "gemma4:31b"
            
            # App Configuration
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: JWT_SECRET
              value: "your-super-secret-jwt-key-change-in-production"
            - name: JWT_REFRESH_SECRET
              value: "your-super-secret-refresh-key-change-in-production"
            
            # CORS Configuration
            - name: ALLOWED_ORIGINS
              value: "http://localhost:3000,http://127.0.0.1:3000,http://192.168.49.2:30007,https://ailearn.duckdns.org"
            
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: eduai
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: backend-nodeport
  namespace: eduai
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30008
  type: NodePort
