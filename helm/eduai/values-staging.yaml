# Staging overrides
backend:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 3
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

aiService:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

frontend:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

ingress:
  hosts:
    - host: staging.eduai.yourdomain.com
  tls:
    - secretName: eduai-staging-tls
      hosts:
        - staging.eduai.yourdomain.com

postgresql:
  primary:
    persistence:
      size: 5Gi

redis:
  master:
    persistence:
      size: 1Gi
