# Production overrides
backend:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 20

aiService:
  replicaCount: 2
  autoscaling:
    minReplicas: 2
    maxReplicas: 10

frontend:
  replicaCount: 3

ingress:
  hosts:
    - host: eduai.yourdomain.com
  tls:
    - secretName: eduai-tls
      hosts:
        - eduai.yourdomain.com

postgresql:
  primary:
    persistence:
      size: 50Gi

redis:
  master:
    persistence:
      size: 10Gi
