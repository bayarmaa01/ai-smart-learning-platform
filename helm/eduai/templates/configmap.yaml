apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eduai.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eduai.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "5000"
  DB_HOST: {{ printf "%s-postgresql" .Release.Name | quote }}
  DB_PORT: "5432"
  DB_NAME: "eduai_db"
  DB_USER: "postgres"
  DB_POOL_MAX: {{ .Values.backend.env.DB_POOL_MAX | quote }}
  REDIS_URL: {{ printf "redis://:%s@%s-redis-master:6379" "$(REDIS_PASSWORD)" .Release.Name | quote }}
  AI_SERVICE_URL: {{ printf "http://%s-ai-service:%d" (include "eduai.fullname" .) (.Values.aiService.service.port | int) | quote }}
  LOG_LEVEL: {{ .Values.backend.env.LOG_LEVEL | quote }}
  AI_PROVIDER: {{ .Values.aiService.env.AI_PROVIDER | quote }}
  OPENAI_MODEL: {{ .Values.aiService.env.OPENAI_MODEL | quote }}
  MAX_TOKENS: {{ .Values.aiService.env.MAX_TOKENS | quote }}
  RATE_LIMIT_PER_MINUTE: {{ .Values.aiService.env.RATE_LIMIT_PER_MINUTE | quote }}
  {{- range $key, $value := .Values.backend.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
