apiVersion: v2
name: eduai
description: AI-Powered Online Learning Platform - Production Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - education
  - ai
  - learning
  - saas
maintainers:
  - name: EduAI Team
    email: devops@eduai.com
dependencies:
  - name: postgresql
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
